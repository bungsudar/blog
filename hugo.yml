baseurl: 'https://www.sudarblogger.com'
title: Sudar Blogger
theme: ardianta
# disqusShortname: ardianta

services:
  # googleAnalytics:
   # ID: G-CD1PXK7Y6F
  services:
  services.googleAnalytics:
    googleAnalytics: 'G-CD1PXK7Y6F'

  disqus:
    shortname: sudarblogs

permalinks:
  page: '/:slug/'

params:
  author: Sudar Blogger
  email: admin@sudarblogger.com
  description: 'Hello, Saya Sudar. Blog ini belum jadi. Sabar ya...'
  social:
    github: https://github.com/sudarcode
    youtube: https://youtube.com/@sudardiary
    instagram: https://instagram.com/20.22sh
    facebook: https://www.facebook.com/Nauval.sudarmanto

frontmatter:
  date:
    - date
    - publishDate
    - lastmod
  lastmod:
    - ':git'
    - lastmod
    - date
    - publishDate
  publishDate:
    - publishDate
    - date
  expiryDate:
    - expiryDate

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 1
    - identifier: art
      name: Art
      url: 'https://ardiantapargo.deviantart.com/'
      weight: 2
    - identifier: twitter
      name: Twitter
      url: 'https://twitter.com/ardiantapargo'
      weight: 3
    - identifier: github
      name: Github
      url: 'https://github.com/ardianta'
      weight: 4
    - identifier: rss
      name: RSS
      url: 'http://feeds.feedburner.com/ardianta'
      weight: 5

privacy:
  youTube:
    disable: false
    privacyEnhanced: false

    privacy:
  privacy.googleAnalytics: 
    disable: false
    respectDoNotTrack : true
  instagram:
    disable: false
    simple: false

markup:
  goldmark:
    renderer:
      unsafe: true
