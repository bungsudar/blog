<head>
  <title>{{ .Title }}</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <!-- SEO TAG -->
  {{ template "_internal/schema.html" . }}
  {{ template "_internal/opengraph.html" . }}
  {{ template "_internal/google_analytics.html" . }}
  <meta content='summary_large_image' name='twitter:card' />
  <meta content='@ardiantapargo' name='twitter:site' />
  <meta content='@ardiantapargo' name='twitter:creator' />
  <meta property='og:image' content='{{ absURL .Params.Image }}' />
  <meta content='id_ID' property='og:locale' />
  <meta content='ms_MY' property='og:locale:alternate' />
  <meta content='en_US' property='og:locale:alternate' />
  <!-- /SEO TAG -->
{{ with .Params.robotsdisallow }}
<meta name="robots" content="noindex, nofollow, noarchive">
{{ end }}
  <meta name="p:domain_verify" content="045746d704fe9ae94f6f3e87acc80385" />
<meta name="google-site-verification" content="7fJHrHh_XLdZBmb1XgbsdQFcfZ6grWyV1oZ0lWW2tYQ" />
  <link rel="icon" href="/favicon.png" />
<link rel="sitemap" type="application/xml" title="Sitemap" href='{{ "sitemap.xml" | absURL }}' />

  <meta name="description" content="{{ .Params.description }}" />
<meta itemprop="description" content="{{ .Params.description }}" />
<meta property="og:description" content="{{ .Params.description }}" />
<meta name="twitter:description" content="{{ .Params.description }}" />
  <meta name="google-adsense-account" content="ca-pub-1958368636213745">

{{ with .OutputFormats.Get "RSS" }}
  <link href="{{ .Permalink }}" rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }}" />
  <link href="{{ .Permalink }}" rel="feed" type="application/rss+xml" title="{{ $.Site.Title }}" />
{{ end }}
  <link rel="manifest" href='{{ "manifest.json" | absURL }}' />
<meta name="theme-color" content="#141414" />
<meta name="apple-mobile-web-app-title" content="{{ .Site.Params.sitename }}" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&display=swap" rel="stylesheet">

  {{/*  TODO - use local build tailwind instead of CDN  */}}
  <script src="https://cdn.tailwindcss.com?plugins=typography,line-clamp"></script>
  <style>
    body {
      font-family: 'Jost', sans-serif;
    }
  </style>

</head>
